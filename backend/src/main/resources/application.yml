quarkus:
  application:
    name: blockcar-quarkus

  http:
    port: 8080
    cors:
      ~: true
      origins: "*"
      methods: GET,POST,OPTIONS
      headers: "*"

  rest-client:
    blocket-api:
      url: https://api.blocket.se
      scope: jakarta.inject.Singleton

# Anthropic API configuration
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
